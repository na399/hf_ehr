# @package _global_

defaults:
  - ../architecture/based

data:
  dataloader:
    max_length: 1024

model:
  config_kwargs:
    n_positions: ${data.dataloader.max_length}
    n_layer: 16
    n_head: 12
    n_embd: 768
    n_inner: 3072  # Standard GPT2 uses 4x n_embd
    activation_function: "gelu_new"  # Standard GPT2 activation
    # Based-specific features removed - using standard GPT2 config